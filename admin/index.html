<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航管理</title>
    <link rel="stylesheet" href="../style.css"> <!-- 注意路径 ../ -->
</head>
<body>

<div class="admin-container">
    <h1>导航管理</h1>

    <!-- Section for GitHub Token -->
    <div id="token-section" class="form-group">
        <label for="githubToken">GitHub Personal Access Token:</label>
        <input type="password" id="githubToken" placeholder="需要 repo 权限的 Token">
        <small>此 Token 用于修改仓库中的 data.json 文件，不会被存储。</small>
         <p><a href="https://github.com/settings/tokens/new?scopes=repo&description=GitHubPagesAdmin" target="_blank">点击这里生成 Token</a> (请勾选 'repo' 权限)</p>
    </div>

    <!-- Section for Adding New Items -->
    <div class="form-section">
        <h2>添加新导航项</h2>
        <form id="addForm">
            <div class="form-group">
                <label for="name">网页名称:</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="iconUrl">图标 URL:</label>
                <input type="url" id="iconUrl" placeholder="例如: /images/icon.png 或 https://..." required>
            </div>
            <div class="form-group">
                <label for="targetUrl">目标网页链接:</label>
                <input type="url" id="targetUrl" placeholder="例如: https://www.example.com" required>
            </div>
            <button type="submit">添加项目</button>
        </form>
    </div>

    <!-- Section for Listing and Deleting Items -->
    <div class="list-section">
        <h2>现有导航项</h2>
        <div id="admin-list">
            <p>正在加载列表...</p>
            <!-- List will be populated by JavaScript -->
        </div>
    </div>

    <p><a href="../">返回主页</a></p>

</div>

<script>
    // --- 配置 ---
    const GITHUB_USERNAME = 'weakchen007';
    const GITHUB_REPO = 'nav.github.io';
    const DATA_FILE_PATH = 'data.json';
    const GITHUB_API_URL = `https://api.github.com/repos/${weakchen007}/${nav.github.io}/contents/${data.json`;

    // --- 全局变量 ---
    let currentData = [];
    let currentSha = null; // Store the file's SHA hash for updates

    // --- DOM Elements ---
    const tokenInput = document.getElementById('githubToken');
    const addForm = document.getElementById('addForm');
    const nameInput = document.getElementById('name');
    const iconUrlInput = document.getElementById('iconUrl');
    const targetUrlInput = document.getElementById('targetUrl');
    const adminListDiv = document.getElementById('admin-list');

    // --- Functions ---

    /** 获取GitHub Token */
    function getToken() {
        const token = tokenInput.value.trim();
        if (!token) {
            alert('请先输入 GitHub Personal Access Token！');
            tokenInput.focus();
            return null;
        }
        return token;
    }

    /** 显示消息 */
    function showMessage(message, isError = false) {
        // 简单地使用 alert，你可以替换为更友好的 UI 提示
        alert(message);
        if (isError) {
            console.error(message);
        } else {
            console.log(message);
        }
    }

    /** 使用 GitHub API 更新 data.json 文件 */
    async function updateDataOnGitHub(newData, commitMessage) {
        const token = getToken();
        if (!token) return;

        if (!currentSha) {
            showMessage('无法获取文件 SHA，请刷新页面重试。', true);
            return;
        }

        try {
            const contentEncoded = btoa(unescape(encodeURIComponent(JSON.stringify(newData, null, 2)))); // Encode to Base64, handle UTF-8

            const response = await fetch(GITHUB_API_URL, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    message: commitMessage,
                    content: contentEncoded,
                    sha: currentSha // IMPORTANT: Provide the current SHA
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(`GitHub API 更新失败: ${response.status} - ${errorData.message}`);
            }

            const result = await response.json();
            currentSha = result.content.sha; // Update SHA after successful commit
            currentData = newData; // Update local data cache
            renderAdminList(); // Re-render the list
            showMessage(`操作成功: ${commitMessage}`);
            // 清空 Token 输入框（可选，出于安全考虑）
            // tokenInput.value = '';

        } catch (error) {
            showMessage(`更新 GitHub 文件时出错: ${error.message}`, true);
        }
    }

    /** 渲染管理列表 */
    function renderAdminList() {
        adminListDiv.innerHTML = ''; // Clear current list
        if (currentData.length === 0) {
            adminListDiv.innerHTML = '<p>当前没有导航项。</p>';
            return;
        }

        const ul = document.createElement('ul');
        currentData.forEach(item => {
            const li = document.createElement('li');
            li.dataset.id = item.id; // Store id on the element

            const img = document.createElement('img');
            img.src = item.iconUrl;
            img.alt = '';
            img.onerror = function() { this.style.display='none'; } // Hide if icon fails

            const detailsDiv = document.createElement('div');
            detailsDiv.className = 'item-details';
            detailsDiv.innerHTML = `
                <strong>${item.name}</strong>
                <small>${item.targetUrl}</small>
            `;

            const deleteButton = document.createElement('button');
            deleteButton.textContent = '删除';
            deleteButton.className = 'delete-btn';
            deleteButton.onclick = () => handleDelete(item.id);

            li.appendChild(img);
            li.appendChild(detailsDiv);
            li.appendChild(deleteButton);
            ul.appendChild(li);
        });
        adminListDiv.appendChild(ul);
    }

    /** 处理添加项目 */
    async function handleAdd(event) {
        event.preventDefault();
        const newItem = {
            id: Date.now().toString(), // Simple unique ID using timestamp
            name: nameInput.value.trim(),
            iconUrl: iconUrlInput.value.trim(),
            targetUrl: targetUrlInput.value.trim()
        };

        if (!newItem.name || !newItem.iconUrl || !newItem.targetUrl) {
            showMessage('所有字段都是必填的！', true);
            return;
        }

        const updatedData = [...currentData, newItem];
        await updateDataOnGitHub(updatedData, `添加导航项: ${newItem.name}`);

        // Clear the form
        addForm.reset();
    }

    /** 处理删除项目 */
    async function handleDelete(idToDelete) {
        if (!confirm('确定要删除这个导航项吗？')) {
            return;
        }

        const updatedData = currentData.filter(item => item.id !== idToDelete);
        const deletedItem = currentData.find(item => item.id === idToDelete); // For commit message
        const commitMessage = deletedItem ? `删除导航项: ${deletedItem.name}` : '删除导航项';

        await updateDataOnGitHub(updatedData, commitMessage);
    }

    /** 初始加载数据 */
    async function loadInitialData() {
        adminListDiv.innerHTML = '<p>正在加载列表...</p>';
        // 不需要 Token 来读取公共仓库的文件内容，但需要 API URL
        try {
            // 使用API URL获取内容和SHA
            const response = await fetch(GITHUB_API_URL + '?t=' + Date.now()); // Prevent cache

            if (response.status === 404) { // Handle case where data.json doesn't exist yet
                 console.log('data.json not found. Initializing with empty array.');
                 currentData = [];
                 currentSha = null; // No SHA for non-existent file (API will create it on first PUT)
                 adminListDiv.innerHTML = '<p>data.json 文件不存在，将在首次添加时创建。</p>';
                 return; // Don't try to parse or render
            }

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            currentSha = data.sha; // Store the SHA
            // Decode Base64 content
            try {
                 // Handle potential UTF-8 characters correctly during decoding
                 const decodedContent = decodeURIComponent(escape(atob(data.content)));
                 currentData = JSON.parse(decodedContent);
            } catch (e) {
                 console.error("Error parsing JSON data:", e);
                 console.error("Decoded content attempt:", atob(data.content)); // Log raw decoded string
                 throw new Error("无法解析 data.json 的内容。文件可能已损坏或格式不正确。");
            }


            renderAdminList();

        } catch (error) {
            showMessage(`加载初始数据失败: ${error.message}`, true);
            adminListDiv.innerHTML = `<p>加载列表失败: ${error.message}</p>`;
            currentSha = null; // Ensure SHA is null on error
        }
    }

    // --- Event Listeners ---
    addForm.addEventListener('submit', handleAdd);

    // --- Initial Load ---
    loadInitialData();

</script>

</body>
</html>
