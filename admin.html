<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>后台管理</h1>
        <div class="password-section" id="password-section">
            <input type="password" id="password" placeholder="输入管理密码">
            <button onclick="checkPassword()">登录</button>
        </div>
        
        <div id="management-section" style="display:none;">
            <div class="add-site-form">
                <h2>添加新网站</h2>
                <input type="text" id="site-name" placeholder="网站名称">
                <input type="text" id="site-url" placeholder="网站URL">
                <input type="text" id="site-image" placeholder="图片URL">
                <button onclick="addSite()">添加</button>
            </div>
            
            <div class="site-list">
                <h2>网站列表</h2>
                <div id="sites-list">
                    <!-- 网站列表将通过JS动态生成 -->
                </div>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
